# Fun Makers KSA — Local Development Services
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: fmksa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fmksa
      POSTGRES_PASSWORD: fmksa
      POSTGRES_DB: fmksa_dev
    volumes:
      - fmksa-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmksa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fmksa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fmksa-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: fmksa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - fmksa-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: fmksa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fmksa-dev-documents &&
        echo 'Bucket fmksa-dev-documents ready'
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fmksa-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fmksa-postgres-data:
  fmksa-redis-data:
  fmksa-minio-data:
