# Fun Makers KSA — Continuous Integration
# Runs lint, typecheck, test, and build on every PR and push to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  # ──────────────────────────────────────────────
  # Shared setup — checkout, install pnpm + deps
  # ──────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the entire workspace so downstream jobs skip install
      - name: Cache workspace
        uses: actions/cache/save@v4
        with:
          path: |
            .
            !.git
          key: workspace-${{ github.sha }}

  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !.git
          key: workspace-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Checkout (git metadata)
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Lint is a BLOCKING gate as of PIC-81 (PIC-72 foundation closeout): the
      # 125 pre-existing error-level violations across apps/web (121 no-explicit-
      # any + 4 react/no-unescaped-entities) were cleared on merit — salvage-port
      # from PR #4 + fresh typing, proper types only, no eslint-disable. The
      # `continue-on-error` soft-gate flag is removed; `turbo run lint` gates on
      # exit code, which reflects a violation in ANY linted file (verified locally
      # via an exit-code probe). Caveat: turbo's piped stdout can truncate the
      # failing lines on a red run — that is output FIDELITY (tracked in PIC-86),
      # not a coverage gap; the exit code is authoritative. Authoritative merge
      # gates: Setup, Lint, Typecheck, Build, Test.
      - name: Run lint
        run: pnpm turbo run lint

  # ──────────────────────────────────────────────
  # Typecheck
  # ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !.git
          key: workspace-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Checkout (git metadata)
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run typecheck
        run: pnpm turbo run typecheck

  # ──────────────────────────────────────────────
  # Test (with Postgres service container)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fmksa
          POSTGRES_PASSWORD: fmksa
          POSTGRES_DB: fmksa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # PIC-72 cluster 2 (2026-05-22): Redis service container — mirrors
      # infra/docker/docker-compose.yml's redis service for local-CI parity.
      # BullMQ-dependent tests (notifications/*) require Redis at localhost:6379.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # PIC-91 (2026-05-30): MinIO service container — mirrors
      # infra/docker/docker-compose.yml's minio service for local-CI parity.
      # Document/storage tests (documents/*, audit/coverage MinIO-gated) require
      # a live S3-compatible endpoint. Without this, ~43 tests are permanently
      # skipped via describe.skipIf(!MINIO_AVAILABLE). MINIO_AVAILABLE gates on
      # STORAGE_ENDPOINT and STORAGE_BUCKET being set (see STORAGE_* env below).
      minio:
        image: minio/minio:RELEASE.2024-01-01T16-36-33Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        # GitHub Actions 'options' appends to `docker create` verbatim.
        # Positional args after all flags become the container CMD.
        # minio/minio's default entrypoint is /usr/bin/docker-entrypoint.sh
        # which passes all args to the minio binary, so 'server /data'
        # starts the object storage server at /data.
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          minio server /data
    env:
      # F3 (PIC-76): per-package test DBs prevent cross-package turbo concurrency
      # pollution. Each vitest process routes to its own Postgres database via
      # DATABASE_URL_TEST_<PKG> read by that package's tests/setup-test-db.ts.
      # The base fmksa_test DB is retained for prisma tooling (`prisma db push`,
      # `db:seed`) which run against an explicit URL set per step below.
      DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test?schema=public
      DATABASE_URL_TEST: postgresql://fmksa:fmksa@localhost:5432/fmksa_test?schema=public
      DATABASE_URL_TEST_DB: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_db?schema=public
      DATABASE_URL_TEST_CORE: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_core?schema=public
      REDIS_URL: redis://localhost:6379
      # PIC-91 (2026-05-30): MinIO storage env vars. STORAGE_ENDPOINT + STORAGE_BUCKET
      # set MINIO_AVAILABLE=true so document/storage tests run instead of being
      # skipped. NODE_ENV is not 'production' in CI so PIC-90's fail-loud check
      # does not fire even though STORAGE_ACCESS_KEY/SECRET_KEY are the dev defaults.
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: fmksa-dev-documents
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_REGION: us-east-1
      STORAGE_FORCE_PATH_STYLE: "true"
    steps:
      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !.git
          key: workspace-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Checkout (git metadata)
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # PIC-91 (2026-05-30): Create MinIO bucket. The MinIO service container
      # starts but does not pre-create buckets. The minio/mc CLI creates the
      # fmksa-dev-documents bucket so document/storage tests can upload and
      # download. Runs after node/pnpm setup (mc is pulled from the minio/mc
      # image; --network host reaches the service on localhost:9000).
      - name: Create MinIO bucket
        run: |
          docker run --rm --network host \
            minio/mc:latest \
            alias set local http://localhost:9000 minioadmin minioadmin \
            && docker run --rm --network host \
            minio/mc:latest \
            mb --ignore-existing local/fmksa-dev-documents

      # F3 (PIC-76): create per-package test DBs. The Postgres service container
      # only creates POSTGRES_DB=fmksa_test at startup; the per-package DBs
      # (fmksa_test_db, fmksa_test_core) are explicit CREATE DATABASE statements
      # here. Future package additions follow the same pattern: fmksa_test_<pkg>.
      - name: Create per-package test DBs
        run: |
          PGPASSWORD=fmksa psql -h localhost -U fmksa -d fmksa_test -c "CREATE DATABASE fmksa_test_db OWNER fmksa;"
          PGPASSWORD=fmksa psql -h localhost -U fmksa -d fmksa_test -c "CREATE DATABASE fmksa_test_core OWNER fmksa;"

      # Sync schema state to the ephemeral test DB instead of replaying
      # migration history. There is a known-broken migration at 20260415120000
      # (add_sheet_import_layer) that references an enum created in an earlier
      # migration — 'migrate deploy' hits it, 'db push' bypasses it by syncing
      # final schema state directly. Tracked as technical debt to fix properly.
      #
      # F3 (PIC-76): two syncs — one per per-package test DB. DATABASE_URL set
      # explicitly per step so prisma targets the right DB.
      - name: Sync Prisma schema to @fmksa/db test DB
        run: pnpm --filter @fmksa/db exec prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_db?schema=public

      - name: Sync Prisma schema to @fmksa/core test DB
        run: pnpm --filter @fmksa/db exec prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_core?schema=public

      # PIC-72 cluster 2 (2026-05-22): SR-2 step 5 structural enforcement.
      # Seed the test DB so tests have canonical permissions, workflow
      # templates, and reference data. Silent seed failure is the exact failure
      # mode SR-2 step 5 was created to prevent (resolveTemplate returns null
      # at runtime; permission gate-check fails silently). Seed exits CI on
      # failure deliberately; no continue-on-error.
      #
      # F3 (PIC-76): two seeds — one per per-package test DB. DATABASE_URL set
      # explicitly per step.
      - name: Seed @fmksa/db test DB
        run: pnpm --filter @fmksa/db db:seed
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_db?schema=public

      - name: Seed @fmksa/core test DB
        run: pnpm --filter @fmksa/db db:seed
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_core?schema=public

      # Test is a BLOCKING gate as of PIC-72 cluster 1.b (2026-05-28): the
      # continue-on-error flags were removed once the pre-existing test debt
      # cleared — @fmksa/db 42/42 (PIC-76 F3 per-package DBs) and @fmksa/core
      # 0 failed / 45 skipped (PIC-73 + PIC-78 α-rewrites). The 6 PIC-79-ORPHAN
      # skips still pass (skipped != failed) but no longer surface as a CI
      # signal; PIC-79 enforcement is the ticket + grep anchor (note 3f5be662).
      #
      # F3 (PIC-76): explicit per-package test invocations. Replaces single
      # `pnpm turbo run test` which previously ran @fmksa/db + @fmksa/core
      # concurrently against the same DB (catch 22 mechanism). Sequential
      # invocations + per-step DATABASE_URL ensure each package's vitest
      # globalSetup AND setupFiles both see the correct per-package DB.
      # vitest's intra-process `fileParallelism: false` still applies within
      # each package; turbo's cross-package parallelism is what we're undoing.
      - name: Run @fmksa/db tests
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_db?schema=public
        run: pnpm --filter @fmksa/db test

      - name: Run @fmksa/core tests
        env:
          DATABASE_URL: postgresql://fmksa:fmksa@localhost:5432/fmksa_test_core?schema=public
        run: pnpm --filter @fmksa/core test

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !.git
          key: workspace-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Checkout (git metadata)
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run build
        run: pnpm turbo run build
